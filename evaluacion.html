<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Evaluación técnica · Conti Talent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/pages.css" />
  <link rel="stylesheet" href="css/animations.css" />
</head>
<body>
  <header class="site-header">
    <div class="site-header__inner">
      <a class="brand" href="index.html">
        <span class="brand__mark">C</span>
        <span class="brand__name">Conti<span>Talent</span></span>
      </a>
      <nav class="primary-nav">
        <a href="mi-estado.html">Mi estado</a>
        <span class="session-area" id="session-area"></span>
      </nav>
    </div>
  </header>

  <main class="container" style="padding: 48px 24px 96px;">
    <section class="quiz">
      <header class="anim-fade-up" style="margin-bottom: 16px;">
        <span class="badge" id="quiz-area">—</span>
        <h1 id="quiz-title" style="margin-top: 8px;">—</h1>
        <p class="muted">Responde todas las preguntas. Tu puntaje se calculará automáticamente.</p>
      </header>

      <div class="quiz__progress">
        <span id="quiz-progress-text">0 / 0 respondidas</span>
        <span class="soft">Calificación automática</span>
      </div>
      <div class="progress" style="margin-bottom: 24px;">
        <div class="progress__bar" id="quiz-progress-bar" style="width: 0%"></div>
      </div>

      <form id="quiz-form" novalidate>
        <div id="quiz-questions"></div>
        <div class="flex gap-3" style="justify-content: flex-end; margin-top: 24px;">
          <a href="mi-estado.html" class="btn btn--ghost">Guardar y salir</a>
          <button type="submit" class="btn btn--primary btn--lg">Enviar respuestas</button>
        </div>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container site-footer__bottom">
      <span>© 2026 Conti Talent</span>
    </div>
  </footer>

  <script src="js/storage.js"></script>
  <script src="js/seed.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/validators.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/areas.js"></script>
  <script src="js/ofertas.js"></script>
  <script src="js/postulantes.js"></script>
  <script src="js/evaluacion.js"></script>
  <script src="js/main.js"></script>
  <script src="js/page-evaluacion.js"></script>
</body>
</html>

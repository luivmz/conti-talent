<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Postular · Conti Talent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/pages.css" />
  <link rel="stylesheet" href="css/animations.css" />
</head>
<body>
  <header class="site-header">
    <div class="site-header__inner">
      <a class="brand" href="index.html">
        <span class="brand__mark">C</span>
        <span class="brand__name">Conti<span>Talent</span></span>
      </a>
      <nav class="primary-nav">
        <a href="ofertas.html">Ofertas</a>
        <span class="session-area" id="session-area"></span>
      </nav>
    </div>
  </header>

  <main class="container" style="padding: 48px 24px 96px; max-width: 880px;">
    <header class="anim-fade-up" style="margin-bottom:24px;">
      <span class="badge" id="postular-area">—</span>
      <h1 id="postular-title" style="margin-top:8px;">—</h1>
      <p class="muted">Completa tus datos para enviar tu postulación. Después podrás resolver la evaluación técnica.</p>
    </header>

    <div class="stepper" style="margin-bottom: 24px;">
      <div class="step is-current"><span class="step__num">1</span><span>Datos personales</span></div>
      <div class="step"><span class="step__num">2</span><span>Evaluación</span></div>
      <div class="step"><span class="step__num">3</span><span>Estado</span></div>
    </div>

    <form id="postular-form" class="form-grid card anim-fade-up" novalidate>
      <h3 style="margin:0 0 8px;">Datos personales</h3>
      <div class="form-grid form-grid--2">
        <div class="field">
          <label for="nombre">Nombre completo</label>
          <input class="input" id="nombre" name="nombre" />
          <span class="error"></span>
        </div>
        <div class="field">
          <label for="email">Correo electrónico</label>
          <input class="input" type="email" id="email" name="email" />
          <span class="error"></span>
        </div>
      </div>
      <div class="field">
        <label for="telefono">Teléfono</label>
        <input class="input" id="telefono" name="telefono" placeholder="+51 999 999 999" />
        <span class="error"></span>
      </div>

      <h3 style="margin: 16px 0 0;">Experiencia y habilidades</h3>
      <div class="field">
        <label for="experiencia">Experiencia profesional</label>
        <textarea class="textarea" id="experiencia" name="experiencia" placeholder="Cuéntanos sobre tu experiencia, proyectos y logros..."></textarea>
        <span class="error"></span>
      </div>
      <div class="field">
        <label for="habilidades">Habilidades clave</label>
        <textarea class="textarea" id="habilidades" name="habilidades" placeholder="Java, SQL, liderazgo, comunicación..."></textarea>
        <span class="error"></span>
      </div>

      <h3 style="margin: 16px 0 0;">Curriculum Vitae</h3>
      <label class="file-drop" id="cv-drop">
        <input type="file" id="cv-input" accept=".pdf,.doc,.docx" />
        <div class="file-drop__icon">📎</div>
        <div style="font-weight:500" id="cv-label">Sube tu CV (PDF o DOCX)</div>
        <div class="soft" style="font-size: 0.85rem;">Haz clic o arrastra el archivo aquí</div>
      </label>

      <div class="flex gap-3" style="justify-content: flex-end; margin-top: 16px;">
        <a href="ofertas.html" class="btn btn--ghost">Cancelar</a>
        <button type="submit" class="btn btn--primary btn--lg">Enviar postulación</button>
      </div>
    </form>
  </main>

  <footer class="site-footer">
    <div class="container site-footer__bottom">
      <span>© 2026 Conti Talent</span>
    </div>
  </footer>

  <script src="js/storage.js"></script>
  <script src="js/seed.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/validators.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/areas.js"></script>
  <script src="js/ofertas.js"></script>
  <script src="js/postulantes.js"></script>
  <script src="js/main.js"></script>
  <script src="js/page-postular.js"></script>
</body>
</html>
